node_lines:
- node_line_name: retrieve_node_line
  nodes:
    - node_type: lexical_retrieval
      strategy:
        metrics: [retrieval_f1, retrieval_recall, retrieval_precision]
      top_k: 3
      modules:
        - module_type: bm25
    - node_type: passage_reranker
      strategy:
        metrics: [retrieval_f1, retrieval_recall]
      top_k: 3
      modules:
        - module_type: pass_reranker
        - module_type: flashrank_reranker

- node_line_name: post_retrieve_node_line
  nodes:
    - node_type: prompt_maker
      strategy:
        metrics: [bleu, rouge]
        generator_modules:
          - module_type: llama_index_llm
            llm: ollama
            model: gemma4:e2b
      modules:
        - module_type: fstring
          prompt:
            - "Read the passages and answer the question.\nQuestion: {query}\nPassage: {retrieved_contents}\nAnswer:"
            - "Based on the following context, answer the question.\nContext: {retrieved_contents}\nQuestion: {query}\nAnswer:"
    - node_type: generator
      strategy:
        metrics:
          - metric_name: bleu
          - metric_name: rouge
      modules:
        - module_type: llama_index_llm
          llm: ollama
          model: [gemma4:e2b]

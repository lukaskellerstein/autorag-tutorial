vectordb:
  - name: default
    db_type: chroma
    client_type: persistent
    embedding_model: huggingface_baai_bge_small
    collection_name: default
    path: ${PROJECT_DIR}/resources/chroma

node_lines:
- node_line_name: retrieve_node_line
  nodes:
    - node_type: hybrid_retrieval
      strategy:
        metrics: [retrieval_f1, retrieval_recall, retrieval_precision, retrieval_ndcg]
        retrieval_modules:
          - module_type: bm25
          - module_type: vectordb
            vectordb: default
      top_k: 5
      modules:
        - module_type: hybrid_rrf
          weight_range: "(4, 80)"
        - module_type: hybrid_cc
          normalize_method: [mm, tmm, z]
          weight_range: "(0.0, 1.0)"

    - node_type: passage_reranker
      strategy:
        metrics: [retrieval_f1, retrieval_recall, retrieval_precision]
      top_k: 3
      modules:
        - module_type: pass_reranker
        - module_type: flashrank_reranker

- node_line_name: post_retrieve_node_line
  nodes:
    - node_type: prompt_maker
      strategy:
        metrics: [bleu, rouge]
        generator_modules:
          - module_type: llama_index_llm
            llm: ollama
            model: gemma4:e2b
      modules:
        - module_type: fstring
          prompt: "Answer the question based on the passages.\nQuestion: {query}\nPassages: {retrieved_contents}\nAnswer:"
    - node_type: generator
      strategy:
        metrics:
          - metric_name: bleu
          - metric_name: rouge
      modules:
        - module_type: llama_index_llm
          llm: ollama
          model: [gemma4:e2b]

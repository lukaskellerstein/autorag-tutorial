vectordb:
  - name: default
    db_type: chroma
    client_type: persistent
    embedding_model: huggingface_baai_bge_small
    collection_name: default
    path: ${PROJECT_DIR}/resources/chroma

node_lines:
- node_line_name: retrieve_node_line
  nodes:
    - node_type: query_expansion
      strategy:
        metrics: [retrieval_f1, retrieval_recall]
        retrieval_modules:
          - module_type: bm25
      modules:
        - module_type: pass_query_expansion
        - module_type: hyde
          llm: ollama
          model: gemma4:e2b

    - node_type: retrieval
      strategy:
        metrics: [retrieval_f1, retrieval_recall]
      top_k: 3
      modules:
        - module_type: bm25

    - node_type: passage_augmenter
      strategy:
        metrics: [retrieval_f1, retrieval_recall]
      modules:
        - module_type: pass_passage_augmenter
        - module_type: prev_next_augmenter
          mode: both
          num_passages: 1

    - node_type: passage_reranker
      strategy:
        metrics: [retrieval_f1, retrieval_recall, retrieval_precision]
      top_k: 3
      modules:
        - module_type: pass_reranker
        - module_type: flashrank_reranker

    - node_type: passage_filter
      strategy:
        metrics: [retrieval_f1, retrieval_recall, retrieval_precision]
      modules:
        - module_type: pass_passage_filter
        - module_type: similarity_threshold_cutoff
          threshold: 0.5

    - node_type: passage_compressor
      strategy:
        metrics: [retrieval_f1, retrieval_recall]
      modules:
        - module_type: pass_compressor
        - module_type: tree_summarize
          llm: ollama
          model: gemma4:e2b

- node_line_name: post_retrieve_node_line
  nodes:
    - node_type: prompt_maker
      strategy:
        metrics: [bleu, rouge]
        generator_modules:
          - module_type: llama_index_llm
            llm: ollama
            model: gemma4:e2b
      modules:
        - module_type: fstring
          prompt: "Answer the question based on the passages.\nQuestion: {query}\nPassages: {retrieved_contents}\nAnswer:"
        - module_type: long_context_reorder

    - node_type: generator
      strategy:
        metrics:
          - metric_name: bleu
          - metric_name: rouge
      modules:
        - module_type: llama_index_llm
          llm: ollama
          model: [gemma4:e2b]

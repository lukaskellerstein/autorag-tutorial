vectordb:
  - name: bge_small
    db_type: chroma
    client_type: persistent
    embedding_model: huggingface_baai_bge_small
    collection_name: bge_small
    path: ${PROJECT_DIR}/resources/chroma

  - name: mpnet
    db_type: chroma
    client_type: persistent
    embedding_model: huggingface_all_mpnet_base_v2
    collection_name: mpnet
    path: ${PROJECT_DIR}/resources/chroma

node_lines:
- node_line_name: retrieve_node_line
  nodes:
    - node_type: semantic_retrieval
      strategy:
        metrics: [retrieval_f1, retrieval_recall, retrieval_precision, retrieval_ndcg, retrieval_mrr]
      top_k: 3
      modules:
        - module_type: vectordb
          vectordb: bge_small
        - module_type: vectordb
          vectordb: mpnet

- node_line_name: post_retrieve_node_line
  nodes:
    - node_type: prompt_maker
      strategy:
        metrics: [bleu, rouge]
        generator_modules:
          - module_type: llama_index_llm
            llm: ollama
            model: gemma4:e2b
      modules:
        - module_type: fstring
          prompt: "Answer based on the passages.\nQuestion: {query}\nPassages: {retrieved_contents}\nAnswer:"
    - node_type: generator
      strategy:
        metrics:
          - metric_name: bleu
          - metric_name: rouge
      modules:
        - module_type: llama_index_llm
          llm: ollama
          model: [gemma4:e2b]
